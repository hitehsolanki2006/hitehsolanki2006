name: Generate Contribution Snake

on:
  schedule:
    # Run once every 24 hours
    - cron: "0 21 * * *"
  
  # Allows manual execution from the Actions tab
  workflow_dispatch:

# Grant write permissions to contents to allow the bot to push to the output branch
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # Generates a snake game from a github user ($GITHUB_REPOSITORY) contributions graph, output a svg animation
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: hitehsolanki2006
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # Push the content of dist to the output branch
      - name: Push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
