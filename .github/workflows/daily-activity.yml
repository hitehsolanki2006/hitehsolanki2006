name: Daily GitHub Activity Rotation

on:
  schedule:
    - cron: '30 20 * * *'
  workflow_dispatch:

jobs:
  rotate-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run rotation script
        env:
          GH_TOKEN: ${{ secrets.AUTO_COMMIT_TOKEN }}
          GH_USER: hitehsolanki2006
        run: |
          REPOS=(
            "salon-management-system"
            "python-logic-revision"
            "jenkins-cicd-learning"
            "INFOSCAN"
            "terraform-aws-ec2-iac"
            "jenkins-multibranch-demo"
            "hunter-site"
          )

          MESSAGES=(
            "docs: update README with latest notes"
            "chore: minor cleanup and formatting"
            "docs: add usage example"
            "fix: correct typo in documentation"
            "chore: update .gitignore entries"
            "docs: improve project description"
            "chore: refresh config comments"
            "docs: add contributing notes"
            "fix: fix broken markdown link"
            "chore: tidy up folder structure notes"
            "docs: clarify setup instructions"
            "chore: remove unused comments"
            "docs: update tech stack section"
            "fix: update outdated badge link"
            "chore: sync dev notes"
          )

          # --- Pick repo for today (rotates differently each week) ---
          WEEK=$(date +%V)
          DOW=$(date +%u)
          TOTAL=${#REPOS[@]}
          IDX=$(( (WEEK * 3 + DOW - 1) % TOTAL ))
          TARGET_REPO="${REPOS[$IDX]}"

          # --- Pick commit tier randomly (weighted) ---
          # 20% = 1-3, 40% = 4-6, 30% = 7-9, 10% = 10-15
          ROLL=$(( RANDOM % 10 ))
          if [ $ROLL -lt 2 ]; then
            NUM_COMMITS=$(( (RANDOM % 3) + 1 ))    # 1-3
          elif [ $ROLL -lt 6 ]; then
            NUM_COMMITS=$(( (RANDOM % 3) + 4 ))    # 4-6
          elif [ $ROLL -lt 9 ]; then
            NUM_COMMITS=$(( (RANDOM % 3) + 7 ))    # 7-9
          else
            NUM_COMMITS=$(( (RANDOM % 6) + 10 ))   # 10-15
          fi

          echo "Repo: $TARGET_REPO | Commits today: $NUM_COMMITS"

          git clone https://$GH_TOKEN@github.com/$GH_USER/$TARGET_REPO.git /tmp/target-repo
          cd /tmp/target-repo

          git config user.email "solankihiteshpankajbhai7@gmail.com"
          git config user.name "hitehsolanki2006"

          for i in $(seq 1 $NUM_COMMITS); do
            MSG_IDX=$(( RANDOM % ${#MESSAGES[@]} ))
            MSG="${MESSAGES[$MSG_IDX]}"

            echo "<!-- updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC') pass-$i -->" >> .dev-notes.md

            git add .dev-notes.md
            git commit -m "$MSG"
            sleep 1
          done

          git push
